<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Calculator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Default (Dark) theme variables ────────────────────── */
    body {
      --bg:             #1a1a2e;
      --calc-bg:        #16213e;
      --display-bg:     #0f3460;
      --text:           #e0e0e0;
      --text-main:      #ffffff;
      --text-muted:     #8899aa;
      --btn-num-bg:     #1a1a3e;
      --btn-num-hover:  #2a2a5e;
      --btn-num-text:   #ffffff;
      --btn-op-bg:      #e94560;
      --btn-op-hover:   #ff6b81;
      --btn-util-bg:    #533483;
      --btn-util-hover: #7044a3;
      --btn-sci-bg:     #0e4d6e;
      --btn-sci-hover:  #1a6b8e;
      --btn-eq-bg:      #0f9b58;
      --btn-eq-hover:   #12b866;
    }

    /* ── Dark theme (explicit class for consistency) ────────── */
    body.theme-dark {
      --bg:             #1a1a2e;
      --calc-bg:        #16213e;
      --display-bg:     #0f3460;
      --text:           #e0e0e0;
      --text-main:      #ffffff;
      --text-muted:     #8899aa;
      --btn-num-bg:     #1a1a3e;
      --btn-num-hover:  #2a2a5e;
      --btn-num-text:   #ffffff;
      --btn-op-bg:      #e94560;
      --btn-op-hover:   #ff6b81;
      --btn-util-bg:    #533483;
      --btn-util-hover: #7044a3;
      --btn-sci-bg:     #0e4d6e;
      --btn-sci-hover:  #1a6b8e;
      --btn-eq-bg:      #0f9b58;
      --btn-eq-hover:   #12b866;
    }

    /* ── Light theme ───────────────────────────────────────── */
    body.theme-light {
      --bg:             #f0f2f5;
      --calc-bg:        #ffffff;
      --display-bg:     #e8eaf0;
      --text:           #333333;
      --text-main:      #111111;
      --text-muted:     #888888;
      --btn-num-bg:     #dde1ea;
      --btn-num-hover:  #c8cdd8;
      --btn-num-text:   #333333;
      --btn-op-bg:      #e94560;
      --btn-op-hover:   #ff6b81;
      --btn-util-bg:    #7c4dab;
      --btn-util-hover: #8f5dc0;
      --btn-sci-bg:     #2471a3;
      --btn-sci-hover:  #2e86c1;
      --btn-eq-bg:      #0f9b58;
      --btn-eq-hover:   #12b866;
    }

    /* ── Ocean theme ───────────────────────────────────────── */
    body.theme-ocean {
      --bg:             #0a2a4a;
      --calc-bg:        #0d3b69;
      --display-bg:     #072140;
      --text:           #cce4ff;
      --text-main:      #ffffff;
      --text-muted:     #7fafd4;
      --btn-num-bg:     #0d3b69;
      --btn-num-hover:  #1a5080;
      --btn-num-text:   #cce4ff;
      --btn-op-bg:      #00b4d8;
      --btn-op-hover:   #48cae4;
      --btn-util-bg:    #0077b6;
      --btn-util-hover: #0096c7;
      --btn-sci-bg:     #005f73;
      --btn-sci-hover:  #0a7d8e;
      --btn-eq-bg:      #06d6a0;
      --btn-eq-hover:   #0ff0b3;
    }

    /* ── Sunset theme ──────────────────────────────────────── */
    body.theme-sunset {
      --bg:             #2d1b33;
      --calc-bg:        #3d2545;
      --display-bg:     #251530;
      --text:           #ffe0cc;
      --text-main:      #ffffff;
      --text-muted:     #cc9966;
      --btn-num-bg:     #4d3058;
      --btn-num-hover:  #5d3a6a;
      --btn-num-text:   #ffe0cc;
      --btn-op-bg:      #ff6b35;
      --btn-op-hover:   #ff8c5a;
      --btn-util-bg:    #9b59b6;
      --btn-util-hover: #ab69c6;
      --btn-sci-bg:     #6c3483;
      --btn-sci-hover:  #7d3c98;
      --btn-eq-bg:      #e67e22;
      --btn-eq-hover:   #f39c12;
    }

    /* ── Font Size ─────────────────────────────────────────── */
    body.font-size-small  { --display-font-size: 28px; --btn-font-size: 15px; }
    body.font-size-medium { --display-font-size: 36px; --btn-font-size: 18px; }
    body.font-size-large  { --display-font-size: 44px; --btn-font-size: 21px; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      color: var(--text);
      padding: 40px 20px;
      --display-font-size: 36px;
      --btn-font-size:     18px;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 360px;
    }

    .calculator {
      background: var(--calc-bg);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    /* ── Theme Switcher ────────────────────────────────────── */
    .theme-switcher {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .theme-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
    }

    .theme-dots {
      display: flex;
      gap: 8px;
    }

    .theme-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 0;
      transition: transform 0.15s, box-shadow 0.15s;
      outline: none;
    }

    .theme-dot:hover {
      transform: scale(1.2);
    }

    .theme-dot.active {
      box-shadow: 0 0 0 2px var(--text-main);
      transform: scale(1.1);
    }

    .theme-dot-dark   { background: #1a1a2e; }
    .theme-dot-light  { background: #f0f2f5; border-color: #bbb; }
    .theme-dot-ocean  { background: #00b4d8; }
    .theme-dot-sunset { background: #ff6b35; }

    /* ── Font Size Switcher ─────────────────────────────────── */
    .font-size-switcher {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .font-size-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
    }

    .font-size-options {
      display: flex;
      gap: 8px;
    }

    .font-size-btn {
      height: 22px;
      min-width: 28px;
      padding: 0 6px;
      border-radius: 4px;
      border: 2px solid transparent;
      background: var(--btn-num-bg);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      outline: none;
      line-height: 1;
    }

    .font-size-btn:hover {
      background: var(--btn-num-hover);
    }

    .font-size-btn.active {
      box-shadow: 0 0 0 2px var(--text-main);
      background: var(--btn-util-bg);
      color: #ffffff;
    }

    /* ── Display ───────────────────────────────────────────── */
    .display {
      background: var(--display-bg);
      border-radius: 12px;
      padding: 16px 20px 20px;
      margin-bottom: 16px;
      text-align: right;
      min-height: 88px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .display .angle-mode-indicator {
      font-size: 10px;
      color: var(--btn-op-bg);
      text-align: left;
      font-weight: 700;
      letter-spacing: 0.12em;
      margin-bottom: 2px;
    }

    .display .expression {
      font-size: 13px;
      color: var(--text-muted);
      min-height: 18px;
      word-break: break-all;
    }

    .display .value {
      font-size: var(--display-font-size);
      font-weight: 300;
      color: var(--text-main);
      word-break: break-all;
    }

    /* ── Button Grid ───────────────────────────────────────── */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    button {
      padding: 15px 8px;
      font-size: var(--btn-font-size);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
    }

    button:active {
      transform: scale(0.95);
    }

    .btn-number {
      background: var(--btn-num-bg);
      color: var(--btn-num-text);
    }

    .btn-number:hover {
      background: var(--btn-num-hover);
    }

    .btn-operator {
      background: var(--btn-op-bg);
      color: #ffffff;
    }

    .btn-operator:hover {
      background: var(--btn-op-hover);
    }

    .btn-clear {
      background: var(--btn-util-bg);
      color: #ffffff;
    }

    .btn-clear:hover {
      background: var(--btn-util-hover);
    }

    .btn-utility {
      background: var(--btn-util-bg);
      color: #ffffff;
    }

    .btn-utility:hover {
      background: var(--btn-util-hover);
    }

    /* Scientific function buttons */
    .btn-scientific {
      background: var(--btn-sci-bg);
      color: #ffffff;
      font-size: calc(var(--btn-font-size) * 0.82);
    }

    .btn-scientific:hover {
      background: var(--btn-sci-hover);
    }

    /* Angle mode toggle — active state highlights in operator colour */
    .btn-angle-mode {
      background: var(--btn-sci-bg);
      color: #ffffff;
      font-size: calc(var(--btn-font-size) * 0.78);
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .btn-angle-mode:hover {
      background: var(--btn-sci-hover);
    }

    .btn-angle-mode.rad-active {
      background: var(--btn-op-bg);
    }

    .btn-angle-mode.rad-active:hover {
      background: var(--btn-op-hover);
    }

    .btn-equals {
      background: var(--btn-eq-bg);
      color: #ffffff;
      grid-column: span 4;
    }

    .btn-equals:hover {
      background: var(--btn-eq-hover);
    }

    .btn-zero {
      grid-column: span 2;
    }

    /* ── History Panel ─────────────────────────────────────── */
    .history-panel {
      background: var(--calc-bg);
      border-radius: 16px;
      padding: 16px 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .history-title {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-clear-history {
      padding: 4px 12px;
      font-size: 12px;
      background: var(--btn-util-bg);
      color: #ffffff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }

    .btn-clear-history:hover {
      background: var(--btn-util-hover);
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .history-item {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--display-bg);
      border-radius: 8px;
    }

    .history-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      color: #ffffff;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 6px;
      white-space: normal;
      max-width: 260px;
      word-break: break-all;
      pointer-events: none;
      z-index: 10;
    }

    .history-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: rgba(0, 0, 0, 0.85);
    }

    .history-item:hover .history-tooltip,
    .history-item:focus-within .history-tooltip {
      display: block;
    }

    .history-expression {
      font-size: 13px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 140px;
    }

    .history-result {
      font-size: 15px;
      color: var(--text-main);
      font-weight: 500;
    }

    .history-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .history-percentage {
      font-size: 12px;
      color: var(--text-muted);
    }

    .history-empty {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      padding: 10px 0;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="calculator" data-testid="calculator">
      <!-- Theme Switcher -->
      <div class="theme-switcher" data-testid="theme-switcher">
        <span class="theme-label">Theme</span>
        <div class="theme-dots" role="radiogroup" aria-label="Color theme">
          <button class="theme-dot theme-dot-dark" data-theme="dark" data-testid="theme-btn-dark" title="Dark" aria-label="Dark theme" role="radio" aria-checked="false" tabindex="0"></button>
          <button class="theme-dot theme-dot-light" data-theme="light" data-testid="theme-btn-light" title="Light" aria-label="Light theme" role="radio" aria-checked="false" tabindex="-1"></button>
          <button class="theme-dot theme-dot-ocean" data-theme="ocean" data-testid="theme-btn-ocean" title="Ocean" aria-label="Ocean theme" role="radio" aria-checked="false" tabindex="-1"></button>
          <button class="theme-dot theme-dot-sunset" data-theme="sunset" data-testid="theme-btn-sunset" title="Sunset" aria-label="Sunset theme" role="radio" aria-checked="false" tabindex="-1"></button>
        </div>
      </div>

      <!-- Font Size Switcher -->
      <div class="font-size-switcher" data-testid="font-size-switcher">
        <span class="font-size-label">Size</span>
        <div class="font-size-options" role="radiogroup" aria-label="Font size">
          <button class="font-size-btn" data-size="small"  data-testid="font-size-btn-small"  title="Small"  aria-label="Small font size"  role="radio" aria-checked="false" tabindex="-1">S</button>
          <button class="font-size-btn" data-size="medium" data-testid="font-size-btn-medium" title="Medium" aria-label="Medium font size" role="radio" aria-checked="true"  tabindex="0">M</button>
          <button class="font-size-btn" data-size="large"  data-testid="font-size-btn-large"  title="Large"  aria-label="Large font size"  role="radio" aria-checked="false" tabindex="-1">L</button>
        </div>
      </div>

      <div class="display" data-testid="display">
        <div class="angle-mode-indicator" data-testid="angle-mode-indicator" id="angle-mode-indicator">DEG</div>
        <div class="expression" data-testid="expression"></div>
        <div class="value" data-testid="value">0</div>
      </div>

      <div class="buttons">
        <!-- Scientific row 1: angle mode toggle + trig functions -->
        <button class="btn-angle-mode" data-testid="btn-angle-mode" id="angle-mode-btn" onclick="toggleAngleMode()" title="Toggle degrees / radians">DEG</button>
        <button class="btn-scientific" data-testid="btn-sin" onclick="applyUnary('sin')">sin</button>
        <button class="btn-scientific" data-testid="btn-cos" onclick="applyUnary('cos')">cos</button>
        <button class="btn-scientific" data-testid="btn-tan" onclick="applyUnary('tan')">tan</button>

        <!-- Scientific row 2: log / root / power -->
        <button class="btn-scientific" data-testid="btn-log" onclick="applyUnary('log')">log</button>
        <button class="btn-scientific" data-testid="btn-ln"  onclick="applyUnary('ln')">ln</button>
        <button class="btn-scientific" data-testid="btn-sqrt"   onclick="applyUnary('√')">√</button>
        <button class="btn-scientific" data-testid="btn-square" onclick="applyUnary('x²')">x²</button>

        <!-- Scientific row 3: constants / extra ops -->
        <button class="btn-scientific" data-testid="btn-power"     onclick="setOp('^')">xʸ</button>
        <button class="btn-scientific" data-testid="btn-pi"        onclick="insertConstant('π')">π</button>
        <button class="btn-scientific" data-testid="btn-euler"     onclick="insertConstant('e')">e</button>
        <button class="btn-scientific" data-testid="btn-factorial" onclick="applyUnary('!')">n!</button>

        <!-- Standard utility row -->
        <button class="btn-clear"   data-testid="btn-clear"   onclick="clearAll()">C</button>
        <button class="btn-utility" data-testid="btn-sign"    onclick="toggleSign()">±</button>
        <button class="btn-utility" data-testid="btn-percent" onclick="percent()">%</button>
        <button class="btn-operator" data-testid="btn-divide" onclick="setOp('÷')">÷</button>

        <button class="btn-number" data-testid="btn-7" onclick="digit('7')">7</button>
        <button class="btn-number" data-testid="btn-8" onclick="digit('8')">8</button>
        <button class="btn-number" data-testid="btn-9" onclick="digit('9')">9</button>
        <button class="btn-operator" data-testid="btn-multiply" onclick="setOp('×')">×</button>

        <button class="btn-number" data-testid="btn-4" onclick="digit('4')">4</button>
        <button class="btn-number" data-testid="btn-5" onclick="digit('5')">5</button>
        <button class="btn-number" data-testid="btn-6" onclick="digit('6')">6</button>
        <button class="btn-operator" data-testid="btn-subtract" onclick="setOp('−')">−</button>

        <button class="btn-number" data-testid="btn-1" onclick="digit('1')">1</button>
        <button class="btn-number" data-testid="btn-2" onclick="digit('2')">2</button>
        <button class="btn-number" data-testid="btn-3" onclick="digit('3')">3</button>
        <button class="btn-operator" data-testid="btn-add" onclick="setOp('+')">+</button>

        <button class="btn-number btn-zero" data-testid="btn-0" onclick="digit('0')">0</button>
        <button class="btn-number" data-testid="btn-decimal"  onclick="decimal()">.</button>
        <button class="btn-utility" data-testid="btn-backspace" onclick="backspace()">⌫</button>
        <button class="btn-equals" data-testid="btn-equals" onclick="calculate()">=</button>
      </div>
    </div>

    <div class="history-panel" data-testid="history-panel">
      <div class="history-header">
        <span class="history-title">History</span>
        <button class="btn-clear-history" data-testid="btn-clear-history" onclick="clearHistory()">Clear</button>
      </div>
      <div class="history-list" data-testid="history-list">
        <div class="history-empty" data-testid="history-empty">No history yet</div>
      </div>
    </div>
  </div>

  <script>
    // ── Theme Management ──────────────────────────────────────
    const THEMES = ['dark', 'light', 'ocean', 'sunset'];
    const THEME_KEY = 'calc-theme';

    function setTheme(name) {
      if (!THEMES.includes(name)) name = 'dark';
      document.body.classList.remove(...THEMES.map(t => 'theme-' + t));
      document.body.classList.add('theme-' + name);
      localStorage.setItem(THEME_KEY, name);
      document.querySelectorAll('.theme-dot').forEach(function(btn) {
        const isActive = btn.dataset.theme === name;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-checked', isActive ? 'true' : 'false');
        btn.setAttribute('tabindex', isActive ? '0' : '-1');
      });
    }

    document.querySelectorAll('.theme-dot').forEach(function(btn) {
      btn.addEventListener('click', function() { setTheme(btn.dataset.theme); });
    });

    document.querySelector('.theme-dots').addEventListener('keydown', function(e) {
      if (e.key !== 'ArrowRight' && e.key !== 'ArrowLeft' &&
          e.key !== 'ArrowDown' && e.key !== 'ArrowUp') return;
      e.preventDefault();
      const dots = Array.from(document.querySelectorAll('.theme-dot'));
      const currentIndex = dots.findIndex(function(btn) {
        return btn.getAttribute('aria-checked') === 'true';
      });
      const dir = (e.key === 'ArrowRight' || e.key === 'ArrowDown') ? 1 : -1;
      const newIndex = (currentIndex + dir + dots.length) % dots.length;
      setTheme(dots[newIndex].dataset.theme);
      dots[newIndex].focus();
    });

    const savedTheme = localStorage.getItem(THEME_KEY);
    const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    setTheme(savedTheme || (systemPrefersDark ? 'dark' : 'light'));

    // ── Font Size Management ──────────────────────────────────
    const FONT_SIZES = ['small', 'medium', 'large'];
    const FONT_SIZE_KEY = 'calc-font-size';

    function setFontSize(size) {
      if (!FONT_SIZES.includes(size)) size = 'medium';
      document.body.classList.remove(...FONT_SIZES.map(function(s) { return 'font-size-' + s; }));
      document.body.classList.add('font-size-' + size);
      localStorage.setItem(FONT_SIZE_KEY, size);
      document.querySelectorAll('.font-size-btn').forEach(function(btn) {
        var isActive = btn.dataset.size === size;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-checked', isActive ? 'true' : 'false');
        btn.setAttribute('tabindex', isActive ? '0' : '-1');
      });
    }

    document.querySelectorAll('.font-size-btn').forEach(function(btn) {
      btn.addEventListener('click', function() { setFontSize(btn.dataset.size); });
    });

    document.querySelector('.font-size-options').addEventListener('keydown', function(e) {
      if (e.key !== 'ArrowRight' && e.key !== 'ArrowLeft' &&
          e.key !== 'ArrowDown' && e.key !== 'ArrowUp') return;
      e.preventDefault();
      var btns = Array.from(document.querySelectorAll('.font-size-btn'));
      var currentIndex = btns.findIndex(function(btn) {
        return btn.getAttribute('aria-checked') === 'true';
      });
      var dir = (e.key === 'ArrowRight' || e.key === 'ArrowDown') ? 1 : -1;
      var newIndex = (currentIndex + dir + btns.length) % btns.length;
      setFontSize(btns[newIndex].dataset.size);
      btns[newIndex].focus();
    });

    var savedFontSize = localStorage.getItem(FONT_SIZE_KEY);
    setFontSize(savedFontSize || 'medium');

    // ── Calculator State ──────────────────────────────────────
    let current = '0';
    let previous = '';
    let operator = '';
    let resetNext = false;
    let calcHistory = [];
    let angleMode = 'deg'; // 'deg' | 'rad'

    const display    = document.querySelector('[data-testid="value"]');
    const expression = document.querySelector('[data-testid="expression"]');
    const historyList = document.querySelector('[data-testid="history-list"]');
    const angleModeBtn = document.getElementById('angle-mode-btn');
    const angleModeIndicator = document.getElementById('angle-mode-indicator');

    function updateDisplay() {
      display.textContent = current;
    }

    // ── Angle Mode ────────────────────────────────────────────
    function toggleAngleMode() {
      angleMode = angleMode === 'deg' ? 'rad' : 'deg';
      const label = angleMode.toUpperCase();
      angleModeBtn.textContent = label;
      angleModeIndicator.textContent = label;
      angleModeBtn.classList.toggle('rad-active', angleMode === 'rad');
    }

    function toRadians(x) {
      return angleMode === 'deg' ? x * Math.PI / 180 : x;
    }

    // ── Scientific unary operations ───────────────────────────
    function applyUnary(name) {
      if (current === 'Error') return;
      const val = parseFloat(current);
      let result;

      switch (name) {
        case 'sin': result = Math.sin(toRadians(val)); break;
        case 'cos': result = Math.cos(toRadians(val)); break;
        case 'tan': {
          result = Math.tan(toRadians(val));
          if (!isFinite(result)) { current = 'Error'; updateDisplay(); return; }
          break;
        }
        case 'log': {
          if (val <= 0) { current = 'Error'; updateDisplay(); return; }
          result = Math.log10(val);
          break;
        }
        case 'ln': {
          if (val <= 0) { current = 'Error'; updateDisplay(); return; }
          result = Math.log(val);
          break;
        }
        case '√': {
          if (val < 0) { current = 'Error'; updateDisplay(); return; }
          result = Math.sqrt(val);
          break;
        }
        case 'x²': result = val * val; break;
        case '!': {
          if (val < 0 || val !== Math.floor(val) || val > 170) {
            current = 'Error'; updateDisplay(); return;
          }
          result = jsFactorial(val);
          break;
        }
        default: return;
      }

      const resultStr = String(parseFloat(result.toFixed(10)));
      const exprText = `${name}(${current}) =`;
      expression.textContent = exprText;
      addToHistory(exprText, resultStr);
      current = resultStr;
      resetNext = true;
      updateDisplay();
    }

    function jsFactorial(n) {
      let r = 1;
      for (let i = 2; i <= n; i++) r *= i;
      return r;
    }

    // ── Constants ─────────────────────────────────────────────
    function insertConstant(name) {
      if (name === 'π') current = String(Math.PI);
      else if (name === 'e') current = String(Math.E);
      resetNext = true;
      updateDisplay();
    }

    // ── Basic input ───────────────────────────────────────────
    function digit(d) {
      if (resetNext) {
        current = d;
        resetNext = false;
      } else {
        current = current === '0' ? d : current + d;
      }
      updateDisplay();
    }

    function decimal() {
      if (resetNext) {
        current = '0.';
        resetNext = false;
      } else if (!current.includes('.')) {
        current += '.';
      }
      updateDisplay();
    }

    function setOp(op) {
      if (current === 'Error') return;
      if (operator && !resetNext) {
        calculate();
      }
      previous = current;
      operator = op;
      expression.textContent = `${previous} ${operator}`;
      resetNext = true;
    }

    function calculate() {
      if (!operator || !previous) return;

      const a = parseFloat(previous);
      const b = parseFloat(current);
      let result;

      switch (operator) {
        case '+': result = a + b; break;
        case '−': result = a - b; break;
        case '×': result = a * b; break;
        case '÷': result = b !== 0 ? a / b : 'Error'; break;
        case '^': result = Math.pow(a, b); break;
        default: return;
      }

      const expressionText = `${previous} ${operator} ${current} =`;
      expression.textContent = expressionText;
      const resultStr = result === 'Error' ? 'Error' : String(parseFloat(result.toFixed(10)));

      addToHistory(expressionText, resultStr);

      current = resultStr;
      operator = '';
      previous = '';
      resetNext = true;
      updateDisplay();
    }

    function clearAll() {
      current = '0';
      previous = '';
      operator = '';
      resetNext = false;
      expression.textContent = '';
      updateDisplay();
    }

    function toggleSign() {
      if (current !== '0' && current !== 'Error') {
        current = current.startsWith('-') ? current.slice(1) : '-' + current;
        updateDisplay();
      }
    }

    function percent() {
      if (current !== 'Error') {
        current = String(parseFloat(current) / 100);
        updateDisplay();
      }
    }

    // ── History ───────────────────────────────────────────────
    function addToHistory(expr, result) {
      calcHistory.unshift({ expression: expr, result });
      if (calcHistory.length > 5) calcHistory.pop();
      renderHistory();
    }

    function renderHistory() {
      historyList.innerHTML = '';
      if (calcHistory.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'history-empty';
        empty.dataset.testid = 'history-empty';
        empty.textContent = 'No history yet';
        historyList.appendChild(empty);
        return;
      }

      const latestResult = parseFloat(calcHistory[0].result);
      const latestIsValid = calcHistory[0].result !== 'Error' && !isNaN(latestResult) && latestResult > 0;

      calcHistory.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.dataset.testid = `history-item-${i}`;
        div.tabIndex = 0;

        const exprSpan = document.createElement('span');
        exprSpan.className = 'history-expression';
        exprSpan.dataset.testid = `history-expression-${i}`;
        exprSpan.textContent = item.expression;

        const resultSpan = document.createElement('span');
        resultSpan.className = 'history-result';
        resultSpan.dataset.testid = `history-result-${i}`;
        resultSpan.textContent = item.result;

        const percentSpan = document.createElement('span');
        percentSpan.className = 'history-percentage';
        percentSpan.dataset.testid = `history-percentage-${i}`;

        if (latestIsValid && item.result !== 'Error') {
          const itemResult = parseFloat(item.result);
          if (!isNaN(itemResult)) {
            const pct = (itemResult / latestResult) * 100;
            const rounded = Math.round(pct * 100) / 100;
            percentSpan.textContent = `${rounded}%`;
          }
        }

        const tooltipSpan = document.createElement('span');
        tooltipSpan.className = 'history-tooltip';
        tooltipSpan.dataset.testid = `history-tooltip-${i}`;
        tooltipSpan.id = `history-tooltip-${i}`;
        tooltipSpan.setAttribute('role', 'tooltip');
        tooltipSpan.textContent = item.expression;

        div.setAttribute('aria-describedby', `history-tooltip-${i}`);

        const rightDiv = document.createElement('div');
        rightDiv.className = 'history-right';
        rightDiv.appendChild(resultSpan);
        rightDiv.appendChild(percentSpan);

        div.appendChild(tooltipSpan);
        div.appendChild(exprSpan);
        div.appendChild(rightDiv);
        historyList.appendChild(div);
      });
    }

    function clearHistory() {
      calcHistory = [];
      renderHistory();
    }

    function backspace() {
      if (!resetNext && current.length > 1) {
        const sliced = current.slice(0, -1);
        current = sliced === '-' ? '0' : sliced;
      } else {
        current = '0';
        resetNext = false;
      }
      updateDisplay();
    }

    // ── Keyboard support ──────────────────────────────────────
    document.addEventListener('keydown', function(e) {
      if (e.key >= '0' && e.key <= '9') {
        digit(e.key);
      } else if (e.key === '.') {
        decimal();
      } else if (e.key === '+') {
        setOp('+');
      } else if (e.key === '-') {
        setOp('−');
      } else if (e.key === '*') {
        setOp('×');
      } else if (e.key === '/') {
        e.preventDefault();
        setOp('÷');
      } else if (e.key === '^') {
        setOp('^');
      } else if (e.key === 'Enter' || e.key === '=') {
        calculate();
      } else if (e.key === 'Escape') {
        clearAll();
      } else if (e.key === '%') {
        percent();
      } else if (e.key === 'Backspace') {
        backspace();
      }
    });
  </script>
</body>
</html>
