<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <script>
    // Inline theme init to prevent flash of unstyled content
    (function() {
      var theme = localStorage.getItem('theme') || 'dark';
      if (theme === 'light') document.documentElement.classList.add('light-mode');
    })();
  </script>
  <style>
    :root {
      --bg-body: #1a1a2e;
      --bg-panel: #16213e;
      --bg-display: #0f3460;
      --bg-history-item: #0f3460;
      --text-primary: #e0e0e0;
      --text-value: #ffffff;
      --text-muted: #8899aa;
      --btn-number-bg: #1a1a3e;
      --btn-number-hover: #2a2a5e;
      --shadow-color: rgba(0, 0, 0, 0.4);
    }

    .light-mode {
      --bg-body: #f0f0f8;
      --bg-panel: #ffffff;
      --bg-display: #dde8f8;
      --bg-history-item: #dde8f8;
      --text-primary: #2a2a4a;
      --text-value: #1a1a2e;
      --text-muted: #6677aa;
      --btn-number-bg: #e8e8f8;
      --btn-number-hover: #d8d8f0;
      --shadow-color: rgba(0, 0, 0, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-body);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      color: var(--text-primary);
      padding: 40px 20px;
      transition: background 0.2s, color 0.2s;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 320px;
    }

    .theme-toggle-row {
      display: flex;
      justify-content: flex-end;
    }

    .btn-theme-toggle {
      padding: 8px 14px;
      font-size: 18px;
      background: var(--bg-panel);
      color: var(--text-primary);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 12px var(--shadow-color);
      font-family: inherit;
      line-height: 1;
    }

    .btn-theme-toggle:hover {
      opacity: 0.85;
    }

    .btn-theme-toggle:active {
      transform: scale(0.95);
    }

    .calculator {
      background: var(--bg-panel);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 60px var(--shadow-color);
      transition: background 0.2s, box-shadow 0.2s;
    }

    .display {
      background: var(--bg-display);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: right;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      transition: background 0.2s;
    }

    .display .expression {
      font-size: 14px;
      color: var(--text-muted);
      min-height: 20px;
      word-break: break-all;
    }

    .display .value {
      font-size: 36px;
      font-weight: 300;
      color: var(--text-value);
      word-break: break-all;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 18px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
    }

    button:active {
      transform: scale(0.95);
    }

    .btn-number {
      background: var(--btn-number-bg);
      color: var(--text-value);
    }

    .btn-number:hover {
      background: var(--btn-number-hover);
    }

    .btn-operator {
      background: #e94560;
      color: #ffffff;
    }

    .btn-operator:hover {
      background: #ff6b81;
    }

    .btn-clear {
      background: #533483;
      color: #ffffff;
    }

    .btn-clear:hover {
      background: #7044a3;
    }

    .btn-utility {
      background: #533483;
      color: #ffffff;
    }

    .btn-utility:hover {
      background: #7044a3;
    }

    .btn-equals {
      background: #0f9b58;
      color: #ffffff;
      grid-column: span 4;
    }

    .btn-equals:hover {
      background: #12b866;
    }

    .btn-zero {
      grid-column: span 2;
    }

    /* History panel */
    .history-panel {
      background: var(--bg-panel);
      border-radius: 16px;
      padding: 16px 20px;
      box-shadow: 0 20px 60px var(--shadow-color);
      transition: background 0.2s, box-shadow 0.2s;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .history-title {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-clear-history {
      padding: 4px 12px;
      font-size: 12px;
      background: #533483;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }

    .btn-clear-history:hover {
      background: #7044a3;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--bg-history-item);
      border-radius: 8px;
      transition: background 0.2s;
    }

    .history-expression {
      font-size: 13px;
      color: var(--text-muted);
    }

    .history-result {
      font-size: 15px;
      color: var(--text-value);
      font-weight: 500;
    }

    .history-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .history-percentage {
      font-size: 12px;
      color: var(--text-muted);
    }

    .history-empty {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      padding: 10px 0;
    }

    /* CSS-driven theme icon — renders at the same time as the light-mode class
       set by the <head> script, so no icon FOUC for returning light-mode users */
    [data-testid="theme-icon"] { display: inline-block; }
    [data-testid="theme-icon"]::before { content: "🌙"; }
    html.light-mode [data-testid="theme-icon"]::before { content: "☀️"; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="theme-toggle-row">
      <button id="theme-toggle" class="btn-theme-toggle" data-testid="btn-theme-toggle" onclick="toggleTheme()" aria-label="Switch to light mode">
        <span data-testid="theme-icon"></span>
      </button>
    </div>

    <div class="calculator" data-testid="calculator">
      <div class="display" data-testid="display">
        <div class="expression" data-testid="expression"></div>
        <div class="value" data-testid="value">0</div>
      </div>
      <div class="buttons">
        <button class="btn-clear" data-testid="btn-clear" onclick="clearAll()">C</button>
        <button class="btn-utility" data-testid="btn-sign" onclick="toggleSign()">±</button>
        <button class="btn-utility" data-testid="btn-percent" onclick="percent()">%</button>
        <button class="btn-operator" data-testid="btn-divide" onclick="setOp('÷')">÷</button>

        <button class="btn-number" data-testid="btn-7" onclick="digit('7')">7</button>
        <button class="btn-number" data-testid="btn-8" onclick="digit('8')">8</button>
        <button class="btn-number" data-testid="btn-9" onclick="digit('9')">9</button>
        <button class="btn-operator" data-testid="btn-multiply" onclick="setOp('×')">×</button>

        <button class="btn-number" data-testid="btn-4" onclick="digit('4')">4</button>
        <button class="btn-number" data-testid="btn-5" onclick="digit('5')">5</button>
        <button class="btn-number" data-testid="btn-6" onclick="digit('6')">6</button>
        <button class="btn-operator" data-testid="btn-subtract" onclick="setOp('−')">−</button>

        <button class="btn-number" data-testid="btn-1" onclick="digit('1')">1</button>
        <button class="btn-number" data-testid="btn-2" onclick="digit('2')">2</button>
        <button class="btn-number" data-testid="btn-3" onclick="digit('3')">3</button>
        <button class="btn-operator" data-testid="btn-add" onclick="setOp('+')">+</button>

        <button class="btn-number btn-zero" data-testid="btn-0" onclick="digit('0')">0</button>
        <button class="btn-number" data-testid="btn-decimal" onclick="decimal()">.</button>
        <button class="btn-utility" data-testid="btn-backspace" onclick="backspace()">⌫</button>
        <button class="btn-equals" data-testid="btn-equals" onclick="calculate()">=</button>
      </div>
    </div>

    <div class="history-panel" data-testid="history-panel">
      <div class="history-header">
        <span class="history-title">History</span>
        <button class="btn-clear-history" data-testid="btn-clear-history" onclick="clearHistory()">Clear</button>
      </div>
      <div class="history-list" data-testid="history-list">
        <div class="history-empty" data-testid="history-empty">No history yet</div>
      </div>
    </div>
  </div>

  <script>
    // ── Theme management ──────────────────────────────────────────────────────
    function getStoredTheme() {
      return localStorage.getItem('theme') || 'dark';
    }

    function applyTheme(theme) {
      const btn = document.getElementById('theme-toggle');
      if (theme === 'light') {
        document.documentElement.classList.add('light-mode');
        btn.setAttribute('aria-label', 'Switch to dark mode');
      } else {
        document.documentElement.classList.remove('light-mode');
        btn.setAttribute('aria-label', 'Switch to light mode');
      }
    }

    function toggleTheme() {
      const currentTheme = getStoredTheme();
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', newTheme);
      applyTheme(newTheme);
    }

    // Apply saved theme on load (icon sync; class already applied in <head>)
    applyTheme(getStoredTheme());

    // ── Calculator state ──────────────────────────────────────────────────────
    let current = '0';
    let previous = '';
    let operator = '';
    let resetNext = false;
    let calcHistory = [];

    const display = document.querySelector('[data-testid="value"]');
    const expression = document.querySelector('[data-testid="expression"]');
    const historyList = document.querySelector('[data-testid="history-list"]');

    function updateDisplay() {
      display.textContent = current;
    }

    function digit(d) {
      if (resetNext) {
        current = d;
        resetNext = false;
      } else {
        current = current === '0' ? d : current + d;
      }
      updateDisplay();
    }

    function decimal() {
      if (resetNext) {
        current = '0.';
        resetNext = false;
      } else if (!current.includes('.')) {
        current += '.';
      }
      updateDisplay();
    }

    function setOp(op) {
      if (current === 'Error') return;
      if (operator && !resetNext) {
        calculate();
      }
      previous = current;
      operator = op;
      expression.textContent = `${previous} ${operator}`;
      resetNext = true;
    }

    function calculate() {
      if (!operator || !previous) return;

      const a = parseFloat(previous);
      const b = parseFloat(current);
      let result;

      switch (operator) {
        case '+': result = a + b; break;
        case '−': result = a - b; break;
        case '×': result = a * b; break;
        case '÷': result = b !== 0 ? a / b : 'Error'; break;
        default: return;
      }

      const expressionText = `${previous} ${operator} ${current} =`;
      expression.textContent = expressionText;
      const resultStr = result === 'Error' ? 'Error' : String(parseFloat(result.toFixed(10)));

      addToHistory(expressionText, resultStr);

      current = resultStr;
      operator = '';
      previous = '';
      resetNext = true;
      updateDisplay();
    }

    function clearAll() {
      current = '0';
      previous = '';
      operator = '';
      resetNext = false;
      expression.textContent = '';
      updateDisplay();
    }

    function toggleSign() {
      if (current !== '0' && current !== 'Error') {
        current = current.startsWith('-') ? current.slice(1) : '-' + current;
        updateDisplay();
      }
    }

    function percent() {
      if (current !== 'Error') {
        current = String(parseFloat(current) / 100);
        updateDisplay();
      }
    }

    function addToHistory(expr, result) {
      calcHistory.unshift({ expression: expr, result });
      if (calcHistory.length > 5) calcHistory.pop();
      renderHistory();
    }

    function renderHistory() {
      historyList.innerHTML = '';
      if (calcHistory.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'history-empty';
        empty.dataset.testid = 'history-empty';
        empty.textContent = 'No history yet';
        historyList.appendChild(empty);
        return;
      }

      const latestResult = parseFloat(calcHistory[0].result);
      const latestIsValid = calcHistory[0].result !== 'Error' && !isNaN(latestResult) && latestResult > 0;

      calcHistory.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.dataset.testid = `history-item-${i}`;

        const exprSpan = document.createElement('span');
        exprSpan.className = 'history-expression';
        exprSpan.dataset.testid = `history-expression-${i}`;
        exprSpan.textContent = item.expression;

        const resultSpan = document.createElement('span');
        resultSpan.className = 'history-result';
        resultSpan.dataset.testid = `history-result-${i}`;
        resultSpan.textContent = item.result;

        const percentSpan = document.createElement('span');
        percentSpan.className = 'history-percentage';
        percentSpan.dataset.testid = `history-percentage-${i}`;

        if (latestIsValid && item.result !== 'Error') {
          const itemResult = parseFloat(item.result);
          if (!isNaN(itemResult)) {
            const pct = (itemResult / latestResult) * 100;
            const rounded = Math.round(pct * 100) / 100;
            percentSpan.textContent = `${rounded}%`;
          }
        }

        const rightDiv = document.createElement('div');
        rightDiv.className = 'history-right';
        rightDiv.appendChild(resultSpan);
        rightDiv.appendChild(percentSpan);

        div.appendChild(exprSpan);
        div.appendChild(rightDiv);
        historyList.appendChild(div);
      });
    }

    function clearHistory() {
      calcHistory = [];
      renderHistory();
    }

    function backspace() {
      if (!resetNext && current.length > 1) {
        const sliced = current.slice(0, -1);
        current = sliced === '-' ? '0' : sliced;  // don't leave a bare '-'
      } else {
        current = '0';
        resetNext = false;
      }
      updateDisplay();
    }

    // Keyboard support
    document.addEventListener('keydown', function(e) {
      if (e.key >= '0' && e.key <= '9') {
        digit(e.key);
      } else if (e.key === '.') {
        decimal();
      } else if (e.key === '+') {
        setOp('+');
      } else if (e.key === '-') {
        setOp('−');
      } else if (e.key === '*') {
        setOp('×');
      } else if (e.key === '/') {
        e.preventDefault();
        setOp('÷');
      } else if (e.key === 'Enter' || e.key === '=') {
        calculate();
      } else if (e.key === 'Escape') {
        clearAll();
      } else if (e.key === '%') {
        percent();
      } else if (e.key === 'Backspace') {
        backspace();
      }
    });
  </script>
</body>
</html>
